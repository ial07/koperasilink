version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: koperasilink-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-www:/var/www/certbot
    depends_on:
      - web
      - api
    networks:
      - koperasilink

  certbot:
    image: certbot/certbot
    container_name: koperasilink-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - ./nginx/ssl:/etc/letsencrypt
    networks:
      - koperasilink

  postgres:
    image: postgis/postgis:16-3.4
    container_name: koperasilink-db
    environment:
      POSTGRES_DB: ${DB_NAME:-koperasilink}
      POSTGRES_USER: ${DB_USER:-koperasi}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-koperasi} -d ${DB_NAME:-koperasilink}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - koperasilink

  redis:
    image: redis:7-alpine
    container_name: koperasilink-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - koperasilink

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: koperasilink-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-koperasi}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-koperasilink}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_URL: http://ai:8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - koperasilink

  ai:
    build:
      context: ../../services/ai
      dockerfile: Dockerfile
    container_name: koperasilink-ai
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-koperasi}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-koperasilink}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - koperasilink

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: koperasilink-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    networks:
      - koperasilink

volumes:
  pgdata:
  redisdata:
  certbot-www:

networks:
  koperasilink:
